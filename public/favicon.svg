<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Browser window background -->
  <rect x="15" y="20" width="420" height="320" rx="20" fill="white" stroke="#000" stroke-width="12"/>
  
  <!-- Browser header -->
  <rect x="15" y="20" width="420" height="50" rx="20" fill="#3B82F6" stroke="#000" stroke-width="12"/>
  
  <!-- Browser dots -->
  <circle cx="40" cy="45" r="12" fill="#000"/>
  <circle cx="70" cy="45" r="12" fill="#000"/>
  <circle cx="100" cy="45" r="12" fill="#000"/>
  
  <!-- Magnifying glass circle (outer) -->
  <circle cx="220" cy="130" r="85" fill="#06B6D4" stroke="#001a33" stroke-width="12"/>
  
  <!-- Magnifying glass circle (inner) -->
  <circle cx="220" cy="130" r="75" fill="#06B6D4" stroke="#001a33" stroke-width="8"/>
  
  <!-- Arrow inside magnifying glass -->
  <path d="M 180 95 L 240 155" stroke="#001a33" stroke-width="10" stroke-linecap="round"/>
  <path d="M 220 85 L 245 95 L 235 120" fill="#001a33"/>
  
  <!-- Arrow fill with gradient effect -->
  <path d="M 200 115 L 260 125 L 180 175" fill="#FF006E" stroke="#001a33" stroke-width="8" stroke-linejoin="round"/>
  
  <!-- Dots on left side -->
  <circle cx="55" cy="250" r="8" fill="#000"/>
  <circle cx="55" cy="272" r="8" fill="#000"/>
  <circle cx="55" cy="294" r="8" fill="#000"/>
  
  <!-- Horizontal lines on left -->
  <rect x="75" y="245" width="35" height="10" rx="5" fill="#000"/>
  <rect x="75" y="267" width="35" height="10" rx="5" fill="#000"/>
  <rect x="75" y="289" width="35" height="10" rx="5" fill="#000"/>
  
  <!-- Magnifying glass handle -->
  <rect x="285" y="210" width="30" height="90" rx="15" fill="#5A6B7C" stroke="#001a33" stroke-width="8" transform="rotate(45 300 255)"/>
</svg>